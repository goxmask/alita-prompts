</script>
    <script>
        // --- 核心邏輯架構 ---
        const config = {
            f1: { title: "👑 女主角 1", gender: 'f', color: 'orange' },
            f2: { title: "🌸 女主角 2", gender: 'f', color: 'pink' },
            m1: { title: "🔥 男主角 1", gender: 'm', color: 'blue' },
            m2: { title: "🐺 男主角 2", gender: 'm', color: 'indigo' }
        };

        // 建立單一下拉選單的 HTML
        function buildSelect(idPrefix, key, dbKey) {
            try {
                const data = DB[dbKey];
                if (!data) throw new Error(`Database key "${dbKey}" not found`);
                let options = data.map(opt => `<option value="${opt.en}" data-zh="${opt.zh}">${opt.zh}</option>`).join('');
                return `<select id="${idPrefix}_${key}" class="mb-3">${options}</select>`;
            } catch (e) {
                console.error("buildSelect Error:", e);
                return `<select class="mb-3 border-red-500"><option>Error: ${dbKey}</option></select>`;
            }
        }

        // 切換面板顯示
        function togglePanel(id) {
            const chk = document.getElementById(`chk_${id}`);
            const panel = document.getElementById(`panel_${id}`);
            if (chk && panel) {
                panel.style.display = chk.checked ? 'block' : 'none';
            }
        }

        // 閃爍效果
        function blink(el) {
            if (!el) return;
            el.style.borderColor = "#6366f1";
            el.style.boxShadow = "0 0 15px rgba(99, 102, 241, 0.4)";
            setTimeout(() => { el.style.borderColor = ""; el.style.boxShadow = ""; }, 400);
        }

        // 隨機靈感 (聰明權重版)
        function randomize() {
            try {
                const dice = document.querySelector(".fa-dice");
                if (dice) {
                    dice.style.transition = "transform 0.5s ease";
                    dice.style.transform = `rotate(${Math.random() * 360 + 360}deg)`;
                }

                // 0: 一般, 1: 賽博龐克, 2: 奇幻, 3: 復古, 4: 暗黑哥德, 5: 女優/私密, 6: 溫馨同居
                const theme = Math.floor(Math.random() * 7);
                const sceneSelect = document.getElementById("global_scene");
                const lightSelect = document.getElementById("global_light");
                const camSelect = document.getElementById("global_cam");
                
                const objSelect = document.getElementById("global_obj");
                const petsSelect = document.getElementById("global_pets");
                const compMSelect = document.getElementById("global_comp_m");
                const compSSelect = document.getElementById("global_comp_s");
                
                if (sceneSelect && lightSelect && camSelect) {
                    let sceneIdx = Math.floor(Math.random() * sceneSelect.options.length);
                    let lightIdx = Math.floor(Math.random() * lightSelect.options.length);
                    let camIdx = Math.floor(Math.random() * camSelect.options.length);
                    let objIdx = Math.floor(Math.random() * objSelect.options.length);
                    let petsIdx = Math.floor(Math.random() * petsSelect.options.length);
                    let compMIdx = Math.floor(Math.random() * compMSelect.options.length);
                    let compSIdx = Math.floor(Math.random() * compSSelect.options.length);
                    
                    if (theme === 1) { // 賽博龐克
                        sceneIdx = [16, 17].includes(sceneIdx) ? sceneIdx : 17;
                        lightIdx = 10; objIdx = 3; // neon puddles
                    } else if (theme === 2) { // 奇幻
                        sceneIdx = Math.floor(Math.random() * 10) + 30; // 偏移至奇幻場景
                        lightIdx = 19; objIdx = 8; // glowing orbs
                    } else if (theme === 3) { // 復古
                        sceneIdx = 10;
                        camIdx = [1, 7, 8][Math.floor(Math.random()*3)];
                    } else if (theme === 4) { // 暗黑哥德
                        sceneIdx = 13; lightIdx = 7; petsIdx = 2; // black cat
                    } else if (theme === 5) { // 女優/色慾/私密故事
                        sceneIdx = [23, 24].includes(sceneIdx) ? sceneIdx : 24; // messy bedroom / bathroom
                        lightIdx = 11; // candlelight
                        compMIdx = [1, 2][Math.floor(Math.random()*2)]; // intimate or kabedon
                        compSIdx = 4; // bathtub
                    } else if (theme === 6) { // 溫馨同居正能量
                        sceneIdx = 24; // messy bedroom
                        lightIdx = 3; // dappled sunlight
                        petsIdx = [1, 3][Math.floor(Math.random()*2)]; // sleeping cat or loyal dog
                        compMIdx = 7; // sleeping embraced
                        objIdx = 5; // coffee
                    }
                    
                    sceneSelect.selectedIndex = Math.min(sceneIdx, sceneSelect.options.length - 1);
                    lightSelect.selectedIndex = Math.min(lightIdx, lightSelect.options.length - 1);
                    camSelect.selectedIndex = Math.min(camIdx, camSelect.options.length - 1);
                    if(objSelect) objSelect.selectedIndex = Math.min(objIdx, objSelect.options.length - 1);
                    if(petsSelect) petsSelect.selectedIndex = Math.min(petsIdx, petsSelect.options.length - 1);
                    if(compMSelect) compMSelect.selectedIndex = Math.min(compMIdx, compMSelect.options.length - 1);
                    if(compSSelect) compSSelect.selectedIndex = Math.min(compSIdx, compSSelect.options.length - 1);
                    
                    [sceneSelect, lightSelect, camSelect, objSelect, petsSelect, compMSelect, compSSelect].forEach(el => blink(el));
                }

                // 人物屬性
                ['f1', 'f2', 'm1', 'm2'].forEach(id => {
                    const chk = document.getElementById(`chk_${id}`);
                    if (chk && chk.checked) {
                        ["age", "eth", "face", "body", "outfit", "pose", "exp", "props"].forEach(k => {
                            const el = document.getElementById(`${id}_${k}`);
                            if (el) {
                                let idx = Math.floor(Math.random() * el.options.length);
                                if (theme === 1 && (k === "face" || k === "outfit") && el.options.length > 8) idx = 8;
                                if (theme === 2 && id.startsWith("f") && k === "face" && el.options.length > 9) idx = 9;
                                if (theme === 5 && id.startsWith("f") && k === "outfit") idx = 3; // white shirt no pants
                                if (theme === 5 && id.startsWith("f") && k === "props") idx = 1; // red wine
                                el.selectedIndex = idx;
                                blink(el);
                            }
                        });
                    }
                });

                setTimeout(generate, 300);
            } catch (e) {
                console.error("Randomize Error:", e);
            }
        }

        function getVal(idPrefix, key, lang) {
            const el = document.getElementById(`${idPrefix}_${key}`);
            if (!el) return "";
            return lang === 'en' ? el.value : el.options[el.selectedIndex].getAttribute('data-zh');
        }

        function copy(id) {
            const text = document.getElementById(id).innerText;
            navigator.clipboard.writeText(text).then(() => {
                const btn = document.querySelector(`button[onclick="copy('${id}')"]`);
                if (btn) {
                    const originalText = btn.innerText;
                    btn.innerText = 'COPIED! ✓';
                    btn.style.background = '#10b981';
                    setTimeout(() => {
                        btn.innerText = originalText;
                        btn.style.background = '';
                    }, 2000);
                }
            });
        }

        function generate() {
            try {
                const activeIds = ['f1', 'f2', 'm1', 'm2'].filter(id => {
                    const chk = document.getElementById(`chk_${id}`);
                    return chk && chk.checked;
                });
                
                if (activeIds.length === 0) {
                    alert("請至少選擇一位演員！");
                    return;
                }

                let enChars = [];
                let zhChars = [];

                activeIds.forEach((id, index) => {
                    const titleZh = config[id].title.replace(/[^男女主角 12]/g, '');
                    const titleEn = `[Subject ${index + 1} - ${config[id].gender === 'f' ? 'Female' : 'Male'}]`;
                    
                    const traits = ["age", "eth", "face", "body", "outfit", "pose", "exp", "props"];
                    const v = {};
                    traits.forEach(t => {
                        v[t + 'En'] = getVal(id, t, 'en');
                        v[t + 'Zh'] = getVal(id, t, 'zh');
                    });

                    let propsStr = v.propsEn !== "none" ? `. Holding/Prop: ${v.propsEn}` : "";
                    let propsZhStr = v.propsZh !== "空手 (無道具)" ? `。帶著道具：${v.propsZh}` : "";

                    enChars.push(`${titleEn}: A ${v.ageEn} ${v.ethEn} ${v.faceEn}. Physique: ${v.bodyEn}. Expression: ${v.expEn}. Wearing: ${v.outfitEn}. Pose: ${v.poseEn}${propsStr}.`);
                    zhChars.push(`【${titleZh}】一位${v.ageZh}的${v.ethZh}，${v.faceZh}。身形為${v.bodyZh}，神情${v.expZh}。穿著${v.outfitZh}，動作為${v.poseZh}${propsZhStr}。`);
                });

                const sceneEn = getVal('global', 'scene', 'en'); const sceneZh = getVal('global', 'scene', 'zh');
                const lightEn = getVal('global', 'light', 'en'); const lightZh = getVal('global', 'light', 'zh');
                const camEn = getVal('global', 'cam', 'en'); const camZh = getVal('global', 'cam', 'zh');
                
                // V9 New Elements
                const objEn = getVal('global', 'obj', 'en'); const objZh = getVal('global', 'obj', 'zh');
                const petsEn = getVal('global', 'pets', 'en'); const petsZh = getVal('global', 'pets', 'zh');
                
                let stagingEn = ""; let stagingZh = "";
                if (activeIds.length === 1) {
                    const compEn = getVal('global', 'comp_s', 'en'); const compZh = getVal('global', 'comp_s', 'zh');
                    if(compEn !== "none") { stagingEn = `Composition & Spatial Relation: ${compEn}. `; stagingZh = `構圖位置：${compZh}。`; }
                } else {
                    const compEn = getVal('global', 'comp_m', 'en'); const compZh = getVal('global', 'comp_m', 'zh');
                    if(compEn !== "none") { stagingEn = `Character Interaction: ${compEn}. `; stagingZh = `人物互動：${compZh}。`; }
                }

                let detailsEn = ""; let detailsZh = "";
                if(objEn !== "none") { detailsEn += `Environment details: ${objEn}. `; detailsZh += `環境物件：${objZh}。`; }
                if(petsEn !== "none") { detailsEn += `Animal companion: ${petsEn}. `; detailsZh += `寵物配角：${petsZh}。`; }

                const finalEn = `A hyper-realistic 8K cinematic masterpiece photography featuring ${activeIds.length} subject(s). ${enChars.join('')}The setting is ${sceneEn}. ${stagingEn}${detailsEn}Lighting: ${lightEn}. Shot with ${camEn}. Technical: Subsurface scattering, contact shadows, sharp focus on subjects, cinematic color grading, raw photo style, masterpiece quality.`;
                const finalZh = `【大師級多角色寫真】畫面中包含 ${activeIds.length} 位主角。${zhChars.join('')}場景設定在${sceneZh}。${stagingZh}${detailsZh}光影效果：${lightZh}。拍攝規格：${camZh}。`;

                const outEn = document.getElementById('out-en');
                const outZh = document.getElementById('out-zh');
                if (outEn && outZh) {
                    outEn.style.opacity = '0'; outZh.style.opacity = '0';
                    setTimeout(() => {
                        outEn.innerText = finalEn;
                        outZh.innerText = finalZh;
                        outEn.style.transition = 'opacity 0.5s ease';
                        outZh.style.transition = 'opacity 0.5s ease';
                        outEn.style.opacity = '1'; outZh.style.opacity = '1';
                    }, 150);
                }
            } catch (e) {
                console.error("Generate Error:", e);
            }
        }

        // 初始化所有面板
        function initPanels() {
            try {
                console.log("Initializing Alita Director V9.0...");
                const container = document.getElementById('characters-container');
                if (!container) return;
                
                let fullHtml = '';
                ['f1', 'f2', 'm1', 'm2'].forEach(id => {
                    const c = config[id];
                    const g = c.gender;
                    fullHtml += `
                        <div id="panel_${id}" class="char-panel glass p-5 border-t-4 border-${c.color}-500" style="display:none">
                            <h3 class="text-${c.color}-400 font-black mb-4 text-lg border-b border-gray-700 pb-2">${c.title}</h3>
                            <div class="grid grid-cols-2 gap-3">
                                <div><span class="section-label">年齡</span>${buildSelect(id, 'age', 'age')}</div>
                                <div><span class="section-label">人種</span>${buildSelect(id, 'eth', 'ethnicity')}</div>
                            </div>
                            <div><span class="section-label">容貌風格</span>${buildSelect(id, 'face', g+'_face')}</div>
                            <div><span class="section-label">身形比例</span>${buildSelect(id, 'body', g+'_body')}</div>
                            <div class="grid grid-cols-2 gap-3">
                                <div><span class="section-label">服裝設定</span>${buildSelect(id, 'outfit', g+'_outfit')}</div>
                                <div><span class="section-label text-orange-400">隨身道具</span>${buildSelect(id, 'props', 'props_general')}</div>
                            </div>
                            <div class="grid grid-cols-2 gap-3">
                                <div><span class="section-label">動作姿態</span>${buildSelect(id, 'pose', 'pose')}</div>
                                <div><span class="section-label">神情</span>${buildSelect(id, 'exp', 'exp')}</div>
                            </div>
                        </div>
                    `;
                });
                container.innerHTML = fullHtml;

                document.getElementById('global-env').innerHTML = `
                    <span class="section-label">場景大百科</span>${buildSelect('global', 'scene', 'scene')}
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-3 mt-3">
                        <div><span class="section-label text-indigo-400">環境物件</span>${buildSelect('global', 'obj', 'objects_env')}</div>
                        <div><span class="section-label text-amber-400">寵物配角</span>${buildSelect('global', 'pets', 'pets')}</div>
                    </div>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-3 mt-3">
                        <div><span class="section-label text-pink-400">單人構圖 (1人)</span>${buildSelect('global', 'comp_s', 'composition_single')}</div>
                        <div><span class="section-label text-rose-400">多人互動 (2人+)</span>${buildSelect('global', 'comp_m', 'composition_multi')}</div>
                    </div>
                `;
                document.getElementById('global-lens').innerHTML = `
                    <span class="section-label">光影技術</span>${buildSelect('global', 'light', 'light')}
                    <span class="section-label mt-3">相機規格</span>${buildSelect('global', 'cam', 'camera')}
                `;

                ['f1', 'f2', 'm1', 'm2'].forEach(id => togglePanel(id));
                console.log("Initialization complete!");
            } catch (err) {
                console.error("Initialization failed:", err);
            }
        }

        window.onload = initPanels;
    </script>
</body>
</html>
